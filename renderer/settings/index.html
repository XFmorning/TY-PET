<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="style.css">
  <title>TY AI - 管理</title>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="header-top">
        <div class="header-title">
          <div class="header-logo">🤖</div>
          <div>
            <h1>TY AI</h1>
            <span class="header-sub">管理面板</span>
          </div>
        </div>
        <div class="state-pill" id="statePill">
          <span class="state-dot" id="stateDot"></span>
          <span id="currentState">待机中</span>
        </div>
      </div>
    </header>

    <!-- Status -->
    <div class="status-row">
      <div class="stat-card">
        <span class="stat-icon">🎬</span>
        <div>
          <span class="stat-value" id="statAnimName">待机</span>
          <span class="stat-label">当前动画</span>
        </div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🔄</span>
        <div>
          <span class="stat-value" id="randomStatus">已启用</span>
          <span class="stat-label">随机动作</span>
        </div>
      </div>
    </div>

    <!-- Animations -->
    <div class="card">
      <div class="card-head">
        <span>🎬 动画列表</span>
        <span class="card-badge">点击预览</span>
      </div>
      <div class="anim-grid" id="animGrid"></div>
    </div>

    <!-- Speech -->
    <div class="card">
      <div class="card-head">
        <span>💬 对话文本</span>
        <span class="card-badge">可编辑</span>
      </div>
      <div class="speech-list">
        <div class="speech-row">
          <label>打招呼</label>
          <input type="text" id="speechGreet" maxlength="50" placeholder="点击时说的话">
        </div>
        <div class="speech-row">
          <label>调皮</label>
          <input type="text" id="speechPlayful" maxlength="50" placeholder="快速点击时说的话">
        </div>
        <div class="speech-row">
          <label>蹲下</label>
          <input type="text" id="speechSquat" maxlength="50" placeholder="随机动作时说的话">
        </div>
      </div>
    </div>

    <!-- AI -->
    <div class="card">
      <div class="card-head">
        <span>🤖 AI 对话</span>
        <span class="card-badge">可选</span>
      </div>
      <div class="ai-group">
        <div class="ai-preset-row">
          <label>预设</label>
          <select id="aiPreset">
            <option value="0">默认</option>
          </select>
          <button id="aiPresetAdd" class="ai-preset-btn" title="添加预设">+</button>
          <button id="aiPresetRename" class="ai-preset-btn" title="重命名">✎</button>
          <button id="aiPresetDel" class="ai-preset-btn ai-preset-btn-danger" title="删除预设">−</button>
        </div>
        <div class="ai-row">
          <label>接口URL</label>
          <input type="text" id="aiUrl" placeholder="https://api.openai.com/v1/chat/completions" maxlength="300">
        </div>
        <div class="ai-row">
          <label>API Key</label>
          <div class="ai-password-wrap">
            <input type="password" id="aiApiKey" placeholder="sk-..." maxlength="200">
            <button type="button" id="aiKeyToggle" class="ai-eye-btn" title="显示/隐藏">👁️</button>
          </div>
        </div>
        <div class="ai-row">
          <label>模型</label>
          <input type="text" id="aiModel" placeholder="留空使用默认模型" maxlength="100">
        </div>
        <div class="ai-row ai-row-col">
          <label>系统提示词</label>
          <textarea id="aiSystemPrompt" rows="3" maxlength="500" placeholder="定义 AI 的性格和回复风格..."></textarea>
        </div>
        <div class="ai-toggles">
          <label class="s-row">
            <div class="s-info">
              <span class="s-name">启用 AI</span>
              <span class="s-desc">开启后点击宠物可进行对话</span>
            </div>
            <input type="checkbox" id="chkAiEnabled">
            <span class="toggle"></span>
          </label>
          <label class="s-row">
            <div class="s-info">
              <span class="s-name">点击对话</span>
              <span class="s-desc">单击宠物直接进入聊天模式</span>
            </div>
            <input type="checkbox" id="chkAiClickToChat">
            <span class="toggle"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="card">
      <div class="card-head"><span>⚙️ 设置</span></div>
      <div class="settings-group">
        <label class="s-row">
          <div class="s-info">
            <span class="s-name">窗口置顶</span>
            <span class="s-desc">宠物始终保持在其他窗口上方</span>
          </div>
          <input type="checkbox" id="chkAlwaysOnTop" checked>
          <span class="toggle"></span>
        </label>
        <label class="s-row">
          <div class="s-info">
            <span class="s-name">随机动作</span>
            <span class="s-desc">空闲时自动播放随机动画</span>
          </div>
          <input type="checkbox" id="chkRandom" checked>
          <span class="toggle"></span>
        </label>
        <div class="s-row s-row-noclick">
          <div class="s-info">
            <span class="s-name">时间间隔</span>
            <span class="s-desc">随机动作触发的秒数</span>
          </div>
          <input type="number" id="randomInterval" value="20" min="10" max="600">
        </div>
        <label class="s-row">
          <div class="s-info">
            <span class="s-name">开机自启</span>
            <span class="s-desc">系统启动时自动运行</span>
          </div>
          <input type="checkbox" id="chkAutoStart">
          <span class="toggle"></span>
        </label>
      </div>
    </div>

    <!-- 预设重命名/添加 弹窗 -->
    <div id="presetModal" class="modal-overlay" style="display:none">
      <div class="modal-box">
        <div class="modal-title" id="modalTitle">预设名称</div>
        <input type="text" id="modalInput" class="modal-input" maxlength="30" placeholder="输入预设名称...">
        <div class="modal-actions">
          <button id="modalCancel" class="modal-btn">取消</button>
          <button id="modalOk" class="modal-btn modal-btn-primary">确定</button>
        </div>
      </div>
    </div>

    <footer>
      <span>🤖 TY AI</span>
      <span>·</span>
      <span>v2.0</span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
