<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #wrap {
      display: flex; align-items: center; gap: 3px;
      padding: 3px 5px;
      background: rgba(30, 30, 45, 0.92);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      white-space: nowrap;
      height: 100%; overflow: hidden;
    }
    #input {
      border: none; outline: none;
      background: rgba(255,255,255,0.08);
      color: #eee;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 5px;
      min-width: 80px;
      font-family: inherit;
      white-space: nowrap;
    }
    #input::placeholder { color: rgba(255,255,255,0.3); }
    #sizer {
      position: absolute; visibility: hidden;
      font-size: 12px; white-space: pre;
      font-family: inherit;
    }
    #sendBtn {
      width: 22px; height: 22px; border: none; border-radius: 5px;
      background: rgba(102,126,234,0.4); color: #eee; cursor: pointer;
      font-size: 11px; flex-shrink: 0;
    }
    #sendBtn:hover { background: rgba(102,126,234,0.7); }
    #closeBtn {
      width: 22px; height: 22px; border: none; border-radius: 5px;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
      cursor: pointer; font-size: 11px; flex-shrink: 0;
    }
    #closeBtn:hover { background: rgba(255,80,80,0.4); color: #fff; }
  </style>
</head>
<body>
  <div id="wrap">
    <input id="input" placeholder="和天依说点什么..." maxlength="200" />
    <span id="sizer"></span>
    <button id="sendBtn">➤</button>
    <button id="closeBtn">✕</button>
  </div>
  <script src="chat.js"></script>
</body>
</html>
